version: 2

project_name: ynh

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: ynh
    main: ./cmd/ynh
    binary: ynh
    ldflags:
      - -s -w
      - -X github.com/eyelock/ynh/internal/config.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
  - id: ynd
    main: ./cmd/ynd
    binary: ynd
    ldflags:
      - -s -w
      - -X github.com/eyelock/ynh/internal/config.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

dockers:
  - image_templates:
      - "ghcr.io/eyelock/ynh:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile
    extra_files:
      - go.mod
      - go.sum
      - cmd/
      - internal/
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{ .Version }}"
    goos: linux
    goarch: amd64
  - image_templates:
      - "ghcr.io/eyelock/ynh:{{ .Version }}-arm64"
    use: buildx
    dockerfile: Dockerfile
    extra_files:
      - go.mod
      - go.sum
      - cmd/
      - internal/
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--build-arg=VERSION={{ .Version }}"
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/eyelock/ynh:{{ .Version }}"
    image_templates:
      - "ghcr.io/eyelock/ynh:{{ .Version }}-amd64"
      - "ghcr.io/eyelock/ynh:{{ .Version }}-arm64"
  - name_template: "ghcr.io/eyelock/ynh:latest"
    image_templates:
      - "ghcr.io/eyelock/ynh:{{ .Version }}-amd64"
      - "ghcr.io/eyelock/ynh:{{ .Version }}-arm64"

brews:
  - repository:
      owner: eyelock
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/eyelock/ynh"
    description: "Harness template manager for AI coding assistants"
    license: "MIT"
    test: |
      system "#{bin}/ynh", "version"
      system "#{bin}/ynd", "version"
    install: |
      bin.install "ynh"
      bin.install "ynd"

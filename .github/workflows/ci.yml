name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/**'
            npm:
              - 'integrations/npm/**'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9

  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - name: Check formatting
        run: |
          goimports -l . | tee /tmp/goimports.out
          gofmt -s -l . | tee -a /tmp/goimports.out
          if [ -s /tmp/goimports.out ]; then
            echo "Files need formatting:"
            cat /tmp/goimports.out
            exit 1
          fi

  test-npm:
    name: NPM Integration Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.npm == 'true'
    defaults:
      run:
        working-directory: integrations/npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build ynh binary
        run: make build
        working-directory: .
      - name: Add ynh to PATH
        run: echo "${{ github.workspace }}/bin" >> $GITHUB_PATH
      - name: Run tests
        run: node --test test/*.test.js

  all-clear:
    name: All Clear
    runs-on: ubuntu-latest
    needs: [changes, build, test, lint, format, test-npm]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Job results:"
          echo "  changes: ${{ needs.changes.result }}"
          echo "  build: ${{ needs.build.result }}"
          echo "  test: ${{ needs.test.result }}"
          echo "  lint: ${{ needs.lint.result }}"
          echo "  format: ${{ needs.format.result }}"
          echo "  test-npm: ${{ needs.test-npm.result }}"

          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required checks failed"
            exit 1
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required checks were cancelled"
            exit 1
          else
            echo "All checks passed or skipped appropriately"
            exit 0
          fi

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  e2e:
    name: E2E (release gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make e2e

  release:
    name: Release
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --skip=docker
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  docker:
    name: Docker
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/eyelock/ynh:${{ steps.version.outputs.version }}-amd64
          build-args: VERSION=${{ steps.version.outputs.version }}

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/eyelock/ynh:${{ steps.version.outputs.version }}-arm64
          build-args: VERSION=${{ steps.version.outputs.version }}

      - name: Create multi-arch manifest
        run: |
          VERSION=${{ steps.version.outputs.version }}
          docker buildx imagetools create -t ghcr.io/eyelock/ynh:${VERSION} \
            ghcr.io/eyelock/ynh:${VERSION}-amd64 \
            ghcr.io/eyelock/ynh:${VERSION}-arm64
          docker buildx imagetools create -t ghcr.io/eyelock/ynh:latest \
            ghcr.io/eyelock/ynh:${VERSION}-amd64 \
            ghcr.io/eyelock/ynh:${VERSION}-arm64

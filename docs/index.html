<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ynh</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="A persona manager for AI coding assistants">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    :root {
      --theme-color: #0066cc;
    }

    .sidebar-nav > ul > li > p {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.9em;
      color: var(--theme-color);
      margin-top: 1em;
    }

    .markdown-section code {
      background-color: #f8f8f8;
      border-radius: 2px;
      color: #e96900;
      font-family: 'SF Mono', Monaco, Menlo, Consolas, 'Courier New', monospace;
      margin: 0 2px;
      padding: 3px 5px;
    }

    .markdown-section pre > code {
      background-color: #f8f8f8;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'ynh',
      repo: 'https://github.com/eyelock/ynh',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md',

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results found',
        depth: 4
      },

      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },

      plugins: [
        function(hook, vm) {
          hook.afterEach(function(html, next) {
            next(html + '<hr/><footer><span>Powered by <a href="https://docsify.js.org" target="_blank">docsify</a></span></footer>');
          });
        }
      ]
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>

  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
